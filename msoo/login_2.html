<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배달명수 | 로그인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css" />
  <style>
    :root {
      --primary: #ff7a18;
      --primary-light: #ffb347;
      --bg-soft: #f8faff;
      --text-dark: #2d3436;
      --text-gray: #636e72;
      --white: #ffffff;
      --radius: 20px;
    }

    * { box-sizing: border-box; font-family: 'SUIT', sans-serif; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-soft);
      overflow: hidden;
      position: relative;
    }

    /* 배경 추상화 그래픽 요소 (이미지 스타일 재현) */
    .bg-decoration {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }
    .shape { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.5; }
    .shape-1 { width: 400px; height: 400px; background: #ffeaa7; top: -100px; left: -100px; }
    .shape-2 { width: 350px; height: 350px; background: #fab1a0; bottom: -50px; right: -50px; }
    .shape-3 { width: 300px; height: 300px; background: #81ecec; top: 20%; right: 10%; }

    .wrapper {
      width: 100%;
      max-width: 1000px;
      height: 640px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
      margin: 20px;
      overflow: hidden;
    }

    /* 좌측 정보 영역 */
    .info-section {
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.1));
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 1.2rem;
      margin-bottom: 40px;
      color: var(--primary);
    }

    .brand-logo .dot {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 10px;
    }

    .info-section h1 {
      font-size: 2.5rem;
      line-height: 1.3;
      margin-bottom: 24px;
      color: var(--text-dark);
      word-break: keep-all;
    }

    .info-section p {
      font-size: 1.1rem;
      color: var(--text-gray);
      margin-bottom: 32px;
    }

    .feature-tags {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tag {
      padding: 12px 20px;
      background: white;
      border-radius: 15px;
      font-weight: 600;
      font-size: 0.95rem;
      width: fit-content;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      border: 1px solid rgba(0,0,0,0.05);
    }

    /* 우측 로그인 영역 */
    .login-section {
      background: var(--white);
      padding: 60px 45px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-header h2 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 30px;
    }

    .tabs {
      display: flex;
      background: #f1f3f5;
      padding: 5px;
      border-radius: 15px;
      margin-bottom: 30px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      font-weight: 700;
      color: var(--text-gray);
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.3s;
    }

    .tab.active {
      background: white;
      color: var(--primary);
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .input-field {
      margin-bottom: 20px;
    }

    .input-field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-gray);
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 15px;
      border: 1.5px solid #edf2f7;
      border-radius: 15px;
      font-size: 1rem;
      background: #f8fafc;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px rgba(255, 122, 24, 0.1);
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 10px 20px rgba(255, 122, 24, 0.2);
    }

    .quick-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      font-size: 0.9rem;
    }

    .quick-links a {
      color: var(--text-gray);
      text-decoration: none;
    }

    /* 반응형 처리 */
    @media (max-width: 900px) {
      .wrapper { grid-template-columns: 1fr; height: auto; max-width: 450px; }
      .info-section { display: none; }
    }
  </style>
</head>
<body>

  <div class="bg-decoration">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <main class="wrapper">
    <section class="info-section">
      <div class="brand-logo">
        <div class="dot"></div>
        BAEDAL MYEONGSU
      </div>
      <h1>오늘 매출,<br>더 빠르게 확인하는<br>새로운 로그인 경험</h1>
      <p>사장님과 관리자 모두를 위한 통합 관리 솔루션</p>
      <div class="feature-tags">
        <div class="tag">✓ 실시간 매출 현황 파악</div>
        <div class="tag">✓ 간편한 매장 운영 설정</div>
        <div class="tag">✓ 1:1 맞춤 고객 센터 지원</div>
      </div>
    </section>

    <section class="login-section">
      <div class="login-header">
        <h2>로그인</h2>
      </div>

      <div class="tabs">
        <button class="tab active">사장님</button>
        <button class="tab">관리자</button>
      </div>

      <form onsubmit="return false;">
        <div class="input-field">
          <label>아이디</label>
          <input type="text" placeholder="아이디를 입력하세요">
        </div>
        <div class="input-field">
          <label>비밀번호</label>
          <input type="password" placeholder="비밀번호를 입력하세요">
        </div>
        <button type="submit" class="btn-submit">로그인하기</button>
      </form>

      <div class="quick-links">
        <a href="#">아이디 찾기</a>
        <span style="color: #e2e8f0;">|</span>
        <a href="#">비밀번호 찾기</a>
        <span style="color: #e2e8f0;">|</span>
        <a href="#">회원가입</a>
      </div>
    </section>
  </main>

  <script>
    // 탭 클릭 이벤트
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });
  </script>
</body>
</html>
