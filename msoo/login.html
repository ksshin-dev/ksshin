<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배달명수 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css" rel="stylesheet" />
  <style>
    :root {
      --bg-a: #fff5ec;
      --bg-b: #eff7ff;
      --card: rgba(255, 255, 255, 0.86);
      --line: #dce5f0;
      --txt-main: #121924;
      --txt-sub: #566479;
      --brand-1: #ff7f1f;
      --brand-2: #ffc05b;
      --ok: #18a084;
      --focus: #156fce;
      --danger: #d9362b;
      --radius-xl: 28px;
      --radius-lg: 18px;
      --radius-md: 12px;
      --shadow: 0 24px 52px rgba(22, 43, 73, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SUIT", "Manrope", sans-serif;
      color: var(--txt-main);
      background:
        radial-gradient(circle at 10% 8%, rgba(255, 127, 31, 0.24), transparent 32%),
        radial-gradient(circle at 88% 85%, rgba(24, 160, 132, 0.17), transparent 29%),
        linear-gradient(145deg, var(--bg-a), var(--bg-b));
      display: grid;
      place-items: center;
      padding: clamp(14px, 3vw, 32px);
    }

    .layout {
      width: min(1080px, 100%);
      border-radius: clamp(20px, 3vw, 32px);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(220, 229, 240, 0.9);
      background: rgba(255, 255, 255, 0.74);
      backdrop-filter: blur(8px);
      display: grid;
      grid-template-columns: 1.06fr 1fr;
      animation: rise 0.65s ease both;
    }

    .intro {
      position: relative;
      padding: clamp(26px, 4vw, 48px);
      background: linear-gradient(165deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.78));
      border-right: 1px solid rgba(220, 229, 240, 0.85);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: "Manrope", "SUIT", sans-serif;
      font-weight: 800;
      letter-spacing: -0.02em;
      font-size: clamp(0.95rem, 1.5vw, 1.1rem);
      margin-bottom: clamp(16px, 2.2vw, 26px);
    }

    .brand-pill {
      width: 26px;
      height: 26px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      box-shadow: 0 10px 18px rgba(255, 127, 31, 0.32);
    }

    .logo-wrap {
      width: min(280px, 74%);
      aspect-ratio: 1 / 1;
      border-radius: 32px;
      padding: 14px;
      margin-bottom: clamp(14px, 2.2vw, 22px);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.8));
      border: 1px solid rgba(218, 228, 239, 0.9);
      box-shadow:
        0 14px 30px rgba(17, 43, 70, 0.13),
        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
      display: grid;
      place-items: center;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 12px 18px rgba(16, 34, 54, 0.15));
      transform: translateY(1px);
    }

    h1 {
      margin: 0;
      font-family: "Manrope", "SUIT", sans-serif;
      letter-spacing: -0.03em;
      line-height: 1.2;
      font-size: clamp(1.45rem, 2.6vw, 2.3rem);
    }

    .desc {
      margin: 12px 0 0;
      color: var(--txt-sub);
      font-size: clamp(0.92rem, 1.4vw, 1rem);
      line-height: 1.56;
      max-width: 40ch;
    }

    .badges {
      margin: clamp(16px, 2.3vw, 22px) 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .badges li {
      padding: 10px 12px;
      border-radius: 11px;
      border: 1px solid #e8eef5;
      background: rgba(255, 255, 255, 0.86);
      color: #33445b;
      font-size: 0.91rem;
    }

    .panel {
      padding: clamp(16px, 3vw, 34px);
      background: #fff;
      display: flex;
      align-items: center;
    }

    .card {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--card);
      padding: clamp(18px, 2.5vw, 30px);
      backdrop-filter: blur(5px);
    }

    .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .head h2 {
      margin: 0;
      font-family: "Manrope", "SUIT", sans-serif;
      font-size: clamp(1.07rem, 1.4vw, 1.25rem);
      letter-spacing: -0.02em;
    }

    .head-logo {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid #e2eaf3;
      background: #fff;
      padding: 5px;
      object-fit: contain;
    }

    .tabs {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      background: #f4f8fc;
      border: 1px solid #e4ebf4;
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
      margin-bottom: 16px;
    }

    .tab {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: #63748b;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 9px 8px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .tab.active {
      background: #fff;
      color: #1a2638;
      box-shadow: 0 5px 12px rgba(16, 35, 59, 0.12);
    }

    form {
      display: grid;
      gap: 12px;
    }

    .field {
      position: relative;
    }

    label {
      display: block;
      font-size: 0.83rem;
      font-weight: 600;
      color: #4f6178;
      margin-bottom: 7px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      height: 46px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: #fff;
      color: #152035;
      font-size: 0.95rem;
      padding: 12px 44px 12px 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(21, 111, 206, 0.15);
    }

    .pw-btn {
      position: absolute;
      top: 32px;
      right: 10px;
      border: 0;
      background: transparent;
      color: #65758b;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      padding: 4px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #43566d;
      font-size: 0.88rem;
      cursor: pointer;
      user-select: none;
    }

    .remember input {
      width: 16px;
      height: 16px;
      accent-color: var(--ok);
    }

    .link {
      text-decoration: none;
      color: #166ecb;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .link:hover {
      text-decoration: underline;
    }

    .submit {
      margin-top: 2px;
      border: 0;
      border-radius: var(--radius-md);
      height: 46px;
      color: #fff;
      font-size: 0.98rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      cursor: pointer;
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      box-shadow: 0 10px 24px rgba(255, 127, 31, 0.35);
      transition: transform 0.15s ease;
    }

    .submit:hover {
      transform: translateY(-1px);
    }

    .error {
      min-height: 18px;
      margin: 0;
      color: var(--danger);
      font-size: 0.81rem;
      font-weight: 600;
    }

    .quick {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .quick button {
      border: 1px solid #dbe5ef;
      background: #fff;
      color: #304258;
      border-radius: 12px;
      height: 42px;
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
    }

    .quick button:hover {
      background: #f7fbff;
      border-color: #c9d7e8;
    }

    .foot {
      margin: 12px 0 0;
      text-align: center;
      font-size: 0.85rem;
      color: #5e6c81;
    }

    .foot a {
      color: #136ccb;
      text-decoration: none;
      font-weight: 700;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .intro {
        border-right: 0;
        border-bottom: 1px solid rgba(220, 229, 240, 0.85);
      }

      .logo-wrap {
        width: min(220px, 58%);
      }
    }

    @media (max-width: 640px) {
      .intro {
        text-align: center;
      }

      .brand {
        justify-content: center;
      }

      .logo-wrap {
        margin-left: auto;
        margin-right: auto;
        width: min(180px, 52vw);
        border-radius: 24px;
      }

      .desc {
        margin-left: auto;
        margin-right: auto;
      }

      .badges {
        text-align: left;
      }

      .head {
        margin-bottom: 12px;
      }

      .head-logo {
        width: 34px;
        height: 34px;
      }

      .quick {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 420px) {
      body {
        padding: 10px;
      }

      .panel {
        padding: 10px;
      }

      .card {
        border-radius: 18px;
      }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="layout" role="main">
    <section class="intro" aria-label="브랜드 소개">
      <div class="brand">
        <span class="brand-pill" aria-hidden="true"></span>
        <span>BAEDAL MYEONGSU</span>
      </div>

      <div class="logo-wrap" aria-label="브랜드 로고">
        <img src="logo.png" alt="배달명수 로고" />
      </div>

      <h1>빠르고 직관적인<br />배달명수 로그인</h1>
      <p class="desc">가입비·광고료·수수료 없는 3無 착한 소비1</p>

      <!-- <ul class="badges">
        <li>사장님/관리자 탭 전환</li>
        <li>아이디 저장, 비밀번호 표시 토글</li>
        <li>모바일 최적화 레이아웃과 명확한 포커스 표시</li>
      </ul> -->
    </section>

    <section class="panel" aria-label="로그인 폼">
      <div class="card">
        <div class="head">
          <h2>로그인</h2>
          <img class="head-logo" src="logo.png" alt="배달명수 로고" />
        </div>

        <div class="tabs" role="tablist" aria-label="로그인 유형">
          <button class="tab active" role="tab" aria-selected="true" data-mode="owner" type="button">사장님</button>
          <button class="tab" role="tab" aria-selected="false" data-mode="admin" type="button">관리자</button>
        </div>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="userId">아이디</label>
            <input id="userId" name="userId" type="text" autocomplete="username" placeholder="아이디를 입력하세요" required />
          </div>

          <div class="field">
            <label for="password">비밀번호</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="비밀번호를 입력하세요" required />
            <button id="togglePw" class="pw-btn" type="button" aria-label="비밀번호 표시 전환">보기</button>
          </div>

          <div class="row">
            <label class="remember" for="rememberId">
              <input id="rememberId" type="checkbox" />
              아이디 저장
            </label>
            <a class="link" href="#" onclick="return false;">비밀번호 찾기</a>
          </div>

          <button class="submit" type="submit">로그인하기</button>
          <p id="errorText" class="error" aria-live="polite"></p>
        </form>

        <div class="quick" aria-label="빠른 이동">
          <button type="button">입점 문의</button>
          <button type="button">고객센터</button>
        </div>

        <p class="foot">처음이신가요? <a href="#" onclick="return false;">회원가입</a></p>
      </div>
    </section>
  </main>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const form = document.getElementById('login-form');
    const userId = document.getElementById('userId');
    const password = document.getElementById('password');
    const errorText = document.getElementById('errorText');
    const togglePw = document.getElementById('togglePw');

    let mode = 'owner';

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        tabs.forEach((item) => {
          item.classList.remove('active');
          item.setAttribute('aria-selected', 'false');
        });

        tab.classList.add('active');
        tab.setAttribute('aria-selected', 'true');
        mode = tab.dataset.mode;
        userId.placeholder = mode === 'admin' ? '관리자 아이디를 입력하세요' : '아이디를 입력하세요';
        errorText.textContent = '';
      });
    });

    togglePw.addEventListener('click', () => {
      const masked = password.type === 'password';
      password.type = masked ? 'text' : 'password';
      togglePw.textContent = masked ? '숨김' : '보기';
    });

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const id = userId.value.trim();
      const pw = password.value.trim();

      if (!id || !pw) {
        errorText.textContent = '아이디와 비밀번호를 모두 입력해 주세요.';
        return;
      }

      if (pw.length < 6) {
        errorText.textContent = '비밀번호는 6자 이상 입력해 주세요.';
        return;
      }

      errorText.textContent = '';
      alert((mode === 'owner' ? '사장님' : '관리자') + ' 로그인 요청이 준비되었습니다.');
    });
  </script>
</body>
</html>
